name: Sync to public repo

on:
  push:
    branches: [main]

jobs: 
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SYNC_DEPLOY_KEY }}

      - name: Git configuration
        run: |
          git config --global user.name "Daniel Urchegui"
          git config --global user.email "daniel.urchegui@hotmail.com"

      - name: Delete private files and commit
        run: |
          rm -rf ./packages/enterprise
          rm -rf ./.github
          git add -A
          git commit -m "chore: remove private files" || echo "Nothing to commit"

      - name: Push to public repo
        run: |
          git remote add public git@github.com:Nebula-Labs-SL/Systematic-Literature-Review.git
          git push public HEAD:main --force