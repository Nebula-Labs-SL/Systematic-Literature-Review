name: Sync to public repo

on:
  push:
    branches: [main]

jobs: 
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Git configuration
        env:
          TOKEN: ${{ secrets.PUBLIC_REPO_TOKEN }}
        
        run: |
          git config --global user.name "Daniel Urchegui"
          git config --global user.email "daniel.urchegui@hotmail.com"

      - name: Delete packages/enterprise
        run: |
          rm -rf ./packages/enterprise
          rm -rf ./.github/workflows/sync-public.yml

      - name: Push to public repo
        run: git push https://${{ secrets.PUBLIC_REPO_TOKEN }}@github.com/Nebula-Labs-SL/Systematic-Literature-Review.git HEAD:main --force